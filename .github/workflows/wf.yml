---
name: Fitness Tracker Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  PYTHONVERSION: 3.11

jobs:

  vars:
    runs-on: ubuntu-latest
    outputs:
      PYTHONVERSION: ${{ env.PYTHONVERSION }}
    steps:
      - run: echo "Exposing env vars"

  qualify_code:
    needs: vars
    uses: ./.github/workflows/job_qualify_code.yml
    with:
      PYTHONVERSION: ${{ needs.vars.outputs.PYTHONVERSION }}
      google_drive_data_path: "data"
    secrets:
      ATHLETE: ${{ secrets.ATHLETE }}
      EMAIL: ${{ secrets.EMAIL }}
      USER: ${{ secrets.USER }}

  docker_image_workflow:
    needs: qualify_code
    uses: ./.github/workflows/job_docker_image.yml
    with:
      image-name: fitness-tracker
      image-tag: latest
      github-owner: thenewthinktank

