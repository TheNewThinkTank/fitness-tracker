name: Qualify Code

on:
  workflow_call:
    inputs:
      PYTHONVERSION:
        required: true
        description: Python version to use
        type: string
      google_drive_data_path:
        required: true
        type: string
    secrets:
      ATHLETE:
        required: true
      EMAIL:
        required: true
      USER:
        required: true

jobs:
  qualify_code:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v7

      - name: Setup Python and Poetry
        uses: TheNewThinkTank/gh-actions/.github/actions/setup-python-poetry@v1.0.4
        with:
          python-version: ${{ inputs.PYTHONVERSION }}

      - name: Set GOOGLE_DRIVE_DATA_PATH
        run: echo "GOOGLE_DRIVE_DATA_PATH=${{ inputs.google_drive_data_path }}" >> $GITHUB_ENV

      - name: Cache mypy dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/mypy
          key: ${{ runner.os }}-mypy-${{ hashFiles('**/mypy.ini') }}
          restore-keys: ${{ runner.os }}-mypy-

      - name: Check poetry version
        run: poetry --version

      - name: Static type checks with mypy
        run: make -f .config/Makefile static-type-checks

      - name: wily build and rank
        run: make -f .config/Makefile wily-build-and-rank

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          version: v0.10.0
          ignore_paths: >-
            site-packages
          ignore_names: site-packages

      - name: yamllint workout_programs
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: "./docs/project_docs/Workout-Programs/workout_programs.yml"

      - name: Set up workspace
        run: mkdir -p data

      - name: Run tests
        run: poetry run pytest --rootdir=$(pwd) test/ --cov --cov-report=xml
        env:
          EMAIL: ${{ secrets.EMAIL }}
          USER: ${{ secrets.USER }}
          ATHLETE: ${{ secrets.ATHLETE }}

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v4
        with:
          slug: TheNewThinkTank/fitness-tracker
          verbose: true

      - uses: rojopolis/spellcheck-github-actions@0.60.0
        name: Spellcheck
        with:
          config_path: .config/.spellcheck.yml
          source_files: README.md
          task_name: Markdown
