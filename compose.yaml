services:
  backend:
    build:
      context: .
    ports:
      - "8000:8000"
    container_name: fitness-tracker-backend
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src:/code/src
      - ./data:/code/data
    environment:
      - PYTHONPATH=/code
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:5000"
    container_name: fitness-tracker-frontend
    command: npm run dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
